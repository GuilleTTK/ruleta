<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta PRO</title>

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
}

.container {
  width: 100%;
  height: 150px;
  overflow: hidden;
  border: 3px solid white;
  position: relative;
}

.pointer {
  position: absolute;
  top: 0;
  left: 50%;
  width: 4px;
  height: 100%;
  background: red;
  box-shadow: 0 0 20px red;
  z-index: 10;
}

.track {
  display: flex;
  position: absolute;
}

.item {
  width: 220px;
  height: 150px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.85);
  color: white;
  font-size: 18px;
  border-right: 2px solid gray;
}

.item img {
  width: 60px;
  height: 60px;
  margin-bottom: 5px;
}
</style>
</head>

<body>

<div class="container">
  <div class="pointer"></div>
  <div class="track" id="track"></div>
</div>

<audio id="spinSound" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>
<audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

<script>
const track = document.getElementById("track");
const spinSound = document.getElementById("spinSound");
const winSound = document.getElementById("winSound");

let spins = localStorage.getItem("spins") ? parseInt(localStorage.getItem("spins")) : 0;

const items = [
  {name: "Bronce", img: "bronce.png"},
  {name: "Plata", img: "plata.png"},
  {name: "Oro", img: "oro.png"},
  {name: "Platino", img: "platino.png"},
  {name: "Diamante", img: "diamante.png"},
  {name: "🔥 Elite", img: ""},
  {name: "🛡️ As", img: ""},
  {name: "👑 Unreal", img: ""}
];

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

shuffle(items);

const finalItems = [];
for(let i=0;i<20;i++){
  finalItems.push(...items);
}

finalItems.forEach(item => {
  const div = document.createElement("div");
  div.className = "item";

  if(item.img){
    div.innerHTML = `<img src="${item.img}"><span>${item.name}</span>`;
  } else {
    div.innerHTML = `<span>${item.name}</span>`;
  }

  track.appendChild(div);
});

function spinRoulette(){

  spins++;
  localStorage.setItem("spins", spins);

  let winner;

  if(spins % 400 === 0){
    winner = "👑 Unreal";
  } else {
    if(Math.random() < 0.00001){
      winner = "👑 Unreal";
    } else {
      const normal = items.filter(i => i.name !== "👑 Unreal");
      winner = normal[Math.floor(Math.random() * normal.length)].name;
    }
  }

  const allDivs = document.querySelectorAll(".item");
  let index = 0;

  if(winner !== "👑 Unreal" && Math.random() < 0.25){
    let unrealIndexes = [];

    allDivs.forEach((div, i) => {
      if(div.innerText.includes("Unreal")){
        unrealIndexes.push(i);
      }
    });

    const near = unrealIndexes[Math.floor(Math.random() * unrealIndexes.length)];
    index = near - 1;
  } else {
    allDivs.forEach((div, i) => {
      if(div.innerText.includes(winner) && index === 0){
        index = i;
      }
    });
  }

  const offset = (index * 220) - (window.innerWidth / 2) + 110;

  spinSound.currentTime = 0;
  spinSound.play();

  track.animate([
    { transform: 'translateX(0)' },
    { transform: `translateX(-${offset}px)` }
  ], {
    duration: 3500,
    easing: 'cubic-bezier(0.15, 0.85, 0.2, 1)',
    fill: 'forwards'
  });

  setTimeout(() => {
    spinSound.pause();
    winSound.currentTime = 0;
    winSound.play();
  }, 3500);

}

spinRoulette();
</script>

</body>
</html>
